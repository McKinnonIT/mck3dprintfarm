services:
  mck3dprintfarm:
    image: alastairtech/mck3dprintfarm:latest
    # You can also use a specific version tag:
    # image: alastairtech/mck3dprintfarm:1.0.0
    ports:
      - "3000:3000"
    volumes:
      - ../uploads:/app/uploads
      # Don't mount the entire data directory, just create a volume for persistence
      - mck3dprintfarm_data:/app/data
      # Avoid mounting certificates since we're skipping HTTPS in dev mode in Docker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Skip HTTPS for Docker deployment
      - NEXTAUTH_URL=http://localhost:3000
      # NextAuth secret for JWT encryption and session security
      - NEXTAUTH_SECRET=your-super-secret-random-string-here-please-change-this
      # Default admin user credentials
      - DEFAULT_ADMIN_EMAIL=admin@example.com
      - DEFAULT_ADMIN_PASSWORD=Admin123!
      - DEFAULT_ADMIN_NAME=Administrator
      - ORCASLICER_URL=http://orcaslicer:8090
      - CAMERA_PROXY_API_URL=http://camera-proxy:9997
      # Add other environment variables as needed
    depends_on:
      - orcaslicer
      - camera-proxy

  orcaslicer:
    image: alastairtech/mck3dprintfarm-orcaslicer:latest
    volumes:
      - ../uploads:/data/uploads
    restart: unless-stopped

  camera-proxy:
    image: bluenviron/mediamtx:latest
    volumes:
      - ../docker/camera-proxy/mediamtx.yml:/mediamtx.yml
      # Run docker/camera-proxy/generate-cert.sh once before first deploy.
      - ../docker/camera-proxy/certs:/certs
    ports:
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
    environment:
      # Hostname/IP users' browsers use to reach this box - change this to
      # your actual public hostname, or WebRTC camera streams won't connect.
      - MTX_WEBRTCADDITIONALHOSTS=localhost
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  mck3dprintfarm_data:
