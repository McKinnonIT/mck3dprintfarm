services:
  mck3dprintfarm:
    container_name: mck3dprintfarm
    # Use the image built by the main Dockerfile
    image: mck3dprintfarm:v0.0.7a 
    build:
      context: ..
      dockerfile: Dockerfile
    # The ENTRYPOINT in the Dockerfile now handles the full startup sequence
    # command: |
    #   sh -c " ... removed ... "
    ports:
      - "3000:3000"
    volumes:
      # Map host uploads to container uploads (relative to docker-compose.yml)
      - ./uploads:/app/uploads
      # Use a named volume for persistent database data
      - printfarm-data:/app/data
      # Map host backup directory to container backup directory
      - ./backups:/app/backups
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-super-secret-random-string-here-please-change-this
      # Point DATABASE_URL to the new location
      - DATABASE_URL=file:/app/data/dev.db
      # Default admin user credentials (used by create-admin-user.js)
      - DEFAULT_ADMIN_EMAIL=admin@example.com
      - DEFAULT_ADMIN_PASSWORD=Admin123!
      - DEFAULT_ADMIN_NAME=Administrator
      # Default Site Settings (will be used if not set in DB)
      - DEFAULT_PRINT_FARM_TITLE=My Awesome Farm
      - DEFAULT_ORG_NAME=My Organization
      - DEFAULT_ORG_WEBSITE=https://example.com
    networks:
      - printfarm_network

# Define the named volume
volumes:
  printfarm-data:
    # You can add driver options here if needed, but default is usually fine

networks:
  printfarm_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.201.0.0/24
          gateway: 192.201.0.1 
